<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de precios - Ticket 58mm</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <div>
        <h1>Lista de precios</h1>
        <p class="app__subtitle">Crea tickets listos para imprimir en 58mm</p>
      </div>
      <button class="btn btn--primary" id="printTicket">Imprimir ticket</button>
    </header>

    <section class="panel">
      <h2>Datos del negocio</h2>
      <div class="panel__grid">
        <label>
          Nombre
          <input id="storeName" type="text" placeholder="Mi negocio" />
        </label>
        <label>
          Dirección
          <input id="storeAddress" type="text" placeholder="Calle 123" />
        </label>
        <label>
          Teléfono
          <input id="storePhone" type="text" placeholder="+52 555 555 555" />
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Productos</h2>
        <span class="panel__hint">Agrega, edita y ordena tus precios</span>
      </div>
      <form id="itemForm" class="item-form">
        <input id="itemName" type="text" placeholder="Nombre del producto" required />
        <input id="itemPrice" type="number" step="0.01" placeholder="Precio" required />
        <button class="btn" type="submit">Agregar</button>
      </form>
      <div class="item-list" id="itemList"></div>
    </section>

    <section class="panel panel--preview">
      <div class="panel__header">
        <h2>Vista previa del ticket</h2>
        <span class="panel__hint">Se ajusta automáticamente a 58mm</span>
      </div>
      <article class="ticket" id="ticket">
        <div class="ticket__header">
          <h3 id="ticketStore">Mi negocio</h3>
          <p id="ticketAddress">Calle 123</p>
          <p id="ticketPhone">+52 555 555 555</p>
          <p id="ticketDate"></p>
        </div>
        <div class="ticket__body" id="ticketBody"></div>
        <div class="ticket__total">
          <span>Total</span>
          <strong id="ticketTotal">$0.00</strong>
        </div>
        <p class="ticket__footer">¡Gracias por tu compra!</p>
      </article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
